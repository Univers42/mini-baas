# ============================================
# mini-baas — Development Stack
# ============================================
# Full-stack environment for the Polyglot App Factory:
#
#   system-db → MongoDB 7    (Control Plane: Master Documents, Metadata)
#   tenant-db → Postgres 16  (Data Plane Phase 2: Shield / Relational tenants)
#   cache     → Redis 7      (Tenant caching, rate limiting, pub/sub)
#   mailpit   → Mailpit      (Notification system email catcher)
#   engine    → Node.js 22   (NestJS BaaS Engine)
# ============================================

version: '3.8'

services:
  # ── Control Plane DB (The Brain) ─────────────────────
  system-db:
    image: mongo:7
    container_name: baas-system-db
    restart: unless-stopped
    ports:
      - "27117:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - baas-net

  # ── Default Tenant DB (The Vault) ────────────────────
  tenant-db:
    image: postgres:16-alpine
    container_name: baas-tenant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tenant_admin
      POSTGRES_PASSWORD: tenant_password
      POSTGRES_DB: tenant_data
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenant_admin"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - baas-net

  # ── Cache & Pub/Sub ──────────────────────────────────
  cache:
    image: redis:7-alpine
    container_name: baas-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - baas-net

  # ── Mailpit ──────────────────────────────────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: baas-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1
    networks:
      - baas-net

  # ── The Polyglot Engine (NestJS) ─────────────────────
  engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: baas-dev-engine
    working_dir: /app
    stdin_open: true
    tty: true
    depends_on:
      system-db:
        condition: service_healthy
      tenant-db:
        condition: service_healthy
      cache:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      # ── Clean Source Code Mount ──
      - ./app:/app
      # ── Named Volumes for Performance ──
      - app-modules:/app/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
      - uploads:/app/uploads
    environment:
      - NODE_ENV=development
      - PORT=3000
      # ── Databases ──
      - MONGODB_URI=mongodb://system-db:27017
      - MONGODB_DB_NAME=mini_baas_control
      - REDIS_HOST=cache
      - REDIS_PORT=6379
      # ── Security ──
      - MASTER_ENCRYPTION_KEY=change_this_to_a_32_byte_hex_string_later
      # ── Mail ──
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
    networks:
      - baas-net

volumes:
  mongo-data:
  pg-data:
  redis-data:
  app-modules:
  pnpm-store:
  uploads:

networks:
  baas-net:
    driver: bridge
