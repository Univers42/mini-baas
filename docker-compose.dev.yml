# ============================================
# mini-baas — Development Stack (App Factory)
# ============================================
# Core Services:
#   system-db  → MongoDB 7    (Control Plane: Stores Tenant Metadata & Schemas)
#   redis      → Redis 7      (Cache Plane: Caches Master Documents)
#   tenant-db  → PostgreSQL 16 (Data Plane: Mock DB for tenant data)
#   api        → Node.js 22   (The Dynamic Engine - NestJS)
# ============================================

version: '3.8'

services:
  # ── Control Plane DB (Metadata & Schemas) ───────────
  system-db:
    image: mongo:7
    container_name: baas-system-db
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - baas-net

  # ── Cache Layer (Metadata Caching) ──────────────────
  redis:
    image: redis:7-alpine
    container_name: baas-redis
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - baas-net

  # ── Mock Tenant DB (For testing the SQL Engine) ─────
  tenant-db:
    image: postgres:16-alpine
    container_name: baas-tenant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tenant_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tenant_pass}
      POSTGRES_DB: ${POSTGRES_DB:-tenant_data}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-tenant_admin}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - baas-net

  # ── The Dynamic Engine (NestJS) ─────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.dev
    container_name: baas-api
    working_dir: /app/backend
    stdin_open: true
    tty: true
    depends_on:
      system-db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./backend:/app/backend
      - ./.env:/app/backend/.env:ro
      - backend-modules:/app/backend/node_modules
      - pnpm-store:/root/.local/share/pnpm/store
    environment:
      - NODE_ENV=development
      - PORT=${PORT:-3000}
      - SYSTEM_DB_URI=mongodb://system-db:27017/baas_control_plane
      - REDIS_URI=redis://redis:6379
      # Note: Tenant DB connections will be resolved dynamically at runtime,
      # but we keep this here just for initial scaffolding if needed.
      - MOCK_TENANT_DB_URL=postgresql://${POSTGRES_USER:-tenant_admin}:${POSTGRES_PASSWORD:-tenant_pass}@tenant-db:5432/${POSTGRES_DB:-tenant_data}
    networks:
      - baas-net

volumes:
  mongo-data:
  pg-data:
  redis-data:
  backend-modules:
  pnpm-store:

networks:
  baas-net:
    driver: bridge
