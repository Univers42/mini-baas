# ============================================
# mini-baas — CI Pipeline (Fase 0)
# ============================================
# Runs on every push to develop/main and on every PR.
# Steps: lint → typecheck → test
# Package manager: pnpm
# ============================================

name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  # ── Lint ─────────────────────────────────────────────
  lint:
    name: 🔍 Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install app dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Lint app
        run: cd app && pnpm exec eslint .

  # ── Type Check ──────────────────────────────────────
  typecheck:
    name: 🏗️ Type Check (Phase 0 strict)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install app dependencies
        run: cd app && pnpm install --frozen-lockfile

      # Strict Phase 0 check: No emits allowed
      - name: Typecheck app
        run: cd app && pnpm exec tsc --noEmit

  # ── Unit & E2E Tests ────────────────────────────────
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    needs: typecheck

    # We need the full Polyglot Engine stack for tests
    services:
      system-db:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      tenant-db:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tenant_admin
          POSTGRES_PASSWORD: tenant_password
          POSTGRES_DB: tenant_data
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenant_admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      cache:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install dependencies
        run: cd app && pnpm install --frozen-lockfile

      - name: Run unit tests
        run: cd app && pnpm test
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: mini_baas_control_test
          TENANT_DB_HOST: localhost
          TENANT_DB_PORT: 5432
          TENANT_DB_USER: tenant_admin
          TENANT_DB_PASSWORD: tenant_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MASTER_ENCRYPTION_KEY: e7b1c4d9a2f60e83b51c9d2f4a6e8b1c4d9a2f60e83b51c9d2f4a6e8b1c4d9a2
          NODE_ENV: test

      - name: Run E2E tests
        run: cd app && pnpm run test:e2e
        env:
          MONGODB_URI: mongodb://localhost:27017
          MONGODB_DB_NAME: mini_baas_control_test
          TENANT_DB_HOST: localhost
          TENANT_DB_PORT: 5432
          TENANT_DB_USER: tenant_admin
          TENANT_DB_PASSWORD: tenant_password
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MASTER_ENCRYPTION_KEY: e7b1c4d9a2f60e83b51c9d2f4a6e8b1c4d9a2f60e83b51c9d2f4a6e8b1c4d9a2
          NODE_ENV: test
