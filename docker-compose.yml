# ============================================
# mini-baas — Production Stack
# ============================================
# Production environment for the Polyglot App Factory:
#
#   system-db → MongoDB 7    (Control Plane: Master Documents, Metadata)
#   tenant-db → Postgres 16  (Data Plane Phase 2: Shield / Relational tenants)
#   cache     → Redis 7      (Tenant caching, rate limiting, pub/sub)
#   engine    → Node.js 22   (NestJS BaaS Engine - Multi-stage optimized build)
#
# Run: make prod
# ============================================

version: '3.8'

services:
  system-db:
    image: mongo:7
    container_name: baas-prod-system-db
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - baas-net

  tenant-db:
    image: postgres:16-alpine
    container_name: baas-prod-tenant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - baas-net

  cache:
    image: redis:7-alpine
    container_name: baas-prod-redis
    restart: unless-stopped
    command: --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis-data:/data
    networks:
      - baas-net

  engine:
    build:
      context: .
      dockerfile: docker/Dockerfile.app
    container_name: baas-prod-engine
    restart: unless-stopped
    depends_on:
      - system-db
      - tenant-db
      - cache
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=${MONGODB_URI}
      - MONGODB_DB_NAME=${MONGODB_DB_NAME}
      - REDIS_HOST=cache
      - MASTER_ENCRYPTION_KEY=${MASTER_ENCRYPTION_KEY}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - uploads:/app/uploads
    networks:
      - baas-net

volumes:
  mongo-data:
  pg-data:
  redis-data:
  uploads:

networks:
  baas-net:
    driver: bridge
