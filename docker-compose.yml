# ============================================
# mini-baas — Production Stack
# ============================================
# Run: make prod
# ============================================

version: '3.8'

services:
  system-db:
    image: mongo:7
    container_name: baas-system-db
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - baas-net

  redis:
    image: redis:7-alpine
    container_name: baas-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1000
    volumes:
      - redis-data:/data
    networks:
      - baas-net

  # ── Mock Tenant DB ──────────────────────────────────
  # Note: In a real production environment, tenant databases
  # would be hosted on separate clusters (e.g., AWS RDS, Atlas).
  # We keep it here only if you are self-hosting everything together.
  tenant-db:
    image: postgres:16-alpine
    container_name: baas-tenant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - baas-net

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: baas-api
    restart: unless-stopped
    depends_on:
      - system-db
      - redis
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - SYSTEM_DB_URI=mongodb://system-db:27017/baas_control_plane
      - REDIS_URI=redis://redis:6379
    networks:
      - baas-net

volumes:
  mongo-data:
  pg-data:
  redis-data:

networks:
  baas-net:
    driver: bridge
  